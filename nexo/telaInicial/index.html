<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela inicial</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
    <main class="container">
        <header class="top"> 
            <section class="sec_user">
                <a href="" class="btn_icon">
                <img src="img/icone_usuário.png" alt="Icone de usuário">
                </a> 
                <p class="msg_user">Bem vindo, usuário</p>
            </section>

            <section class="sec_saldo">
                <p>saldo em conta</p>
                <strong id="saldo"> R$ 0.00 </strong>
                <img id="mostrarSaldo" src="img/icone_olho_aberto.png" alt="Icone de olho aberto">
            </section>
        </header>

        <section class="acoes">
            <a href="../boleto/index.html" class="btn_acoes">
                <span class="txt_acoes">Boleto</span>
                <img class="img_acoes" src="img/icon_código_de_barra.png" alt="Icone código de barras">
            </a>
 
            <a href="../pix/index.html" class="btn_acoes">
                <span class="txt_acoes">Pix</span>
                <img class="img_acoes" src="img/icone_pix.png" alt="Icone de pix">
            </a>

            <a href="../extrato/index.html" class="btn_acoes">
                <span class="txt_acoes">Extrato</span>
                <img class="img_acoes" src="img/icone_extrato.png" alt="Icone de extrato">
            </a>
            
            <a href="" class="btn_acoes">
                <span class="txt_acoes">Cartões</span>
                <img class="img_acoes" src="img/icone_cartão_de_crédito.png" alt="Icone de cartão de crédito">
            </a>

             <a href="../cotacao/index.html" class="btn_acoes">
                <span class="txt_acoes">Cotação</span>
                <img class="img_acoes" src="img/icone_cotação.png" alt="Icone de cotação">
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
