<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>

<body>
    
    <main>

        <section id="cadastroParte1">

            <img src="img/Logo.png" alt="Logotipo da Empresa">
            <p>Cadastro Nexo</p>

            <form id="formParte1">
                <input type="text" id="nomeCompleto" placeholder="Nome Completo" minlength="10" title="Digite seu nome completo" required>
                <input type="date" id="dataNascimento" placeholder="Data de Nascimento" title="Necessário ter 18 anos ou mais" required>
                <input type="text" id="cpf" placeholder="CPF" maxlength="14" title="Informe seu CPF" required>
                <input type="email" id="email" placeholder="E-mail" title="Informe seu e-mail" required>

                <button id="botaoAvancar">Avançar<span>➜</span></button>
            </form>
        </section>
        
        <section id="cadastroParte2" hidden>

            <img src="img/Logo.png" alt="Logotipo da Empresa">
            <p>Cadastro Nexo</p>

            <form id="formParte2">
                
                <input type="text" id="numeroCelular" placeholder="Celular" title="Informe seu celular ou telefone fixo" maxlength="15" required>
                <input type="text" id="endereco" placeholder="Endereço" title="Informe seu endereço" required>
                <input type="password" id="senha" placeholder="Senha" title="Senha deverá possuir 6 digitos númericos" maxlength="6" required>
                <input type="password" id="confirmaSenha" placeholder="Confirma Senha" title="Confime a senha" maxlength="6" required>

                <button id="botaoCadastrar">Cadastre-se</button>
            </form>

        </section>

    </main>

</body>

    <script src="script.js"></script>

</html>
