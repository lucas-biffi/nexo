<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    
    <main>

        <img src="img/Logo.png" alt="Logotipo da Empresa">
        <p>Nexo</p>

        <form id="login">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Insira seu e-mail" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Insira sua senha" maxlength="6" required>

            <button id="acessar">Acessar<span>➜</span></button>
        </form>

    </main>

</body>

    <script src="script.js"></script>

</html>
